name: CI

# Build the C++ core + SwiftUI app and exercise DICOM ingestion end-to-end on
# every push / PR to main, so regressions surface before a release.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    # macos-14 is Apple Silicon (arm64) -- matches our arm64-only build.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install DCMTK
        run: brew install dcmtk

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Generate synthetic CT phantom
        # The runner's Python is Homebrew-managed (PEP 668 "externally managed"),
        # so install into a throwaway venv instead of the system interpreter.
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --quiet --upgrade pip
          .venv/bin/python -m pip install --quiet pydicom numpy
          .venv/bin/python tools/make_test_series.py testdata/phantom

      - name: Headless ingestion test
        run: swift run -c release IngestTest testdata/phantom
