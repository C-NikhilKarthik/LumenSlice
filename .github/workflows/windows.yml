name: Windows build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: windows-2022
    env:
      # Release-only overlay triplet: skips the debug half of every dependency
      # (DCMTK is the expensive one) since CI only ships a Release build.
      VCPKG_DEFAULT_TRIPLET: x64-windows-rel
      VCPKG_OVERLAY_TRIPLETS: '${{ github.workspace }}/triplets'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Persist vcpkg's built packages across runs. The first run pays the full
      # DCMTK build cost (~10 min with the release-only triplet); later runs whose
      # vcpkg.json + triplet + baseline are unchanged restore the prebuilt archives
      # and skip the compile entirely. Only the app's own C++ then recompiles.
      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-x64-windows-rel-${{ hashFiles('vcpkg.json', 'triplets/x64-windows-rel.cmake') }}-cd124b84
          restore-keys: |
            vcpkg-x64-windows-rel-

      # Guarantee the files-cache dir exists on a cache miss (first run) so the
      # readwrite binary source and the post-job cache save both have a target.
      - name: Ensure vcpkg cache dir exists
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/vcpkg_cache" | Out-Null

      - name: Install CMake and DCMTK
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: cd124b84feb0c02a24a2d90981e8358fdee0e077
          vcpkgJsonGlob: '${{ github.workspace }}/vcpkg.json'

      - name: Configure
        env:
          # run-vcpkg auto-enables the GHA binary source (x-gha), which needs
          # ACTIONS_RUNTIME_TOKEN/ACTIONS_CACHE_URL we don't provide. Override it
          # here (step-level env wins over what an earlier step exported) with a
          # plain files cache in a dir that actions/cache persists across runs.
          # The dir lives OUTSIDE the vcpkg checkout so run-vcpkg's reset can't
          # wipe it and force a full DCMTK rebuild every run.
          VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg_cache,readwrite'
        run: >
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows-rel
          -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/triplets

      - name: Build Windows executable
        run: cmake --build build --config Release --parallel

      - name: Assemble Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-windows/resources | Out-Null
          Copy-Item build/Release/LumenSlice.exe dist-windows/LumenSlice.exe
          Copy-Item build/vcpkg_installed/x64-windows-rel/bin/*.dll dist-windows/ -ErrorAction SilentlyContinue
          $dictionary = Get-ChildItem -Path build/vcpkg_installed -Filter dicom.dic -Recurse | Select-Object -First 1
          if (-not $dictionary) { throw "DCMTK dicom.dic was not installed" }
          Copy-Item $dictionary.FullName dist-windows/resources/dicom.dic
          Compress-Archive -Path dist-windows/* -DestinationPath LumenSlice-windows-x64.zip -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: LumenSlice-windows-x64
          path: LumenSlice-windows-x64.zip
          if-no-files-found: error
