<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#2b3a4a"/>
    </marker>
    <marker id="diamond" markerWidth="16" markerHeight="12" refX="1" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,5 L8,1 L15,5 L8,9 z" fill="#e8eef7" stroke="#2b3a4a" stroke-width="1"/>
    </marker>
    <marker id="tri" markerWidth="16" markerHeight="14" refX="14" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M14,1 L14,13 L2,7 z" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="1"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1b2733">SegmentEditor: Facade over mask, table, undo, plus the effect Strategy</text>

  <!-- Facade box -->
  <rect x="60" y="60" width="300" height="150" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="2"/>
  <text x="210" y="84" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1b2733">SegmentEditor  (Facade)</text>
  <line x1="60" y1="94" x2="360" y2="94" stroke="#2b3a4a" stroke-width="1"/>
  <text x="76" y="116" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">apply(SegmentationEffect): long</text>
  <text x="76" y="136" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">threshold / region_grow / paint / ...</text>
  <text x="76" y="156" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">grow_from_seeds / scissor_cut</text>
  <text x="76" y="176" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">push_undo / undo / redo</text>
  <text x="76" y="196" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">add_segment / set_active / color</text>

  <!-- Owned collaborators -->
  <rect x="440" y="60" width="210" height="52" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="545" y="82" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">LabelVolume  mask_</text>
  <text x="545" y="100" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1b2733">one byte per voxel (0..255)</text>

  <rect x="440" y="128" width="210" height="52" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="545" y="150" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">SegmentTable  segments_</text>
  <text x="545" y="168" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1b2733">id, colour, visible, active</text>

  <rect x="440" y="196" width="210" height="52" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="545" y="218" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">UndoStack  undo_</text>
  <text x="545" y="236" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1b2733">RLE snapshots, capped depth</text>

  <!-- non-owning volume -->
  <rect x="440" y="264" width="210" height="46" rx="6" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="2"/>
  <text x="545" y="286" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">const Volume* volume_</text>
  <text x="545" y="303" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1b2733">the loaded scan (not owned)</text>

  <!-- composition edges (diamond at facade) -->
  <line x1="360" y1="86" x2="440" y2="86" stroke="#2b3a4a" stroke-width="1.5" marker-start="url(#diamond)"/>
  <line x1="360" y1="120" x2="440" y2="154" stroke="#2b3a4a" stroke-width="1.5" marker-start="url(#diamond)"/>
  <line x1="360" y1="150" x2="440" y2="222" stroke="#2b3a4a" stroke-width="1.5" marker-start="url(#diamond)"/>
  <line x1="360" y1="185" x2="440" y2="287" stroke="#2b3a4a" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="392" y="270" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" fill="#1b2733">reads (weak)</text>

  <!-- Strategy interface -->
  <rect x="330" y="360" width="240" height="66" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="2"/>
  <text x="450" y="382" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1b2733">SegmentationEffect</text>
  <text x="450" y="399" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" font-style="italic" fill="#1b2733">abstract  (Strategy)</text>
  <text x="450" y="417" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1b2733">apply(Volume, LabelVolume, label): long</text>

  <!-- apply() dispatches to effect -->
  <line x1="210" y1="210" x2="330" y2="388" stroke="#2b3a4a" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="228" y="320" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1b2733">apply() runs any effect</text>

  <!-- Concrete effects -->
  <g font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">
    <rect x="30"  y="480" width="150" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="105" y="505" text-anchor="middle">ThresholdEffect</text>

    <rect x="196" y="480" width="150" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="271" y="505" text-anchor="middle">RegionGrowEffect</text>

    <rect x="362" y="480" width="150" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="437" y="505" text-anchor="middle">PaintEffect</text>

    <rect x="528" y="480" width="150" height="40" rx="5" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="603" y="505" text-anchor="middle">LevelTraceEffect</text>

    <rect x="694" y="480" width="176" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="782" y="505" text-anchor="middle">ClearEffect</text>

    <rect x="30"  y="536" width="150" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="105" y="561" text-anchor="middle">KeepLargestEffect</text>

    <rect x="196" y="536" width="150" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="271" y="561" text-anchor="middle">RemoveSmallEffect</text>

    <rect x="362" y="536" width="150" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="437" y="561" text-anchor="middle">GrowMarginEffect</text>

    <rect x="528" y="536" width="150" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="603" y="561" text-anchor="middle">ShrinkMarginEffect</text>

    <rect x="694" y="536" width="176" height="40" rx="5" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
    <text x="782" y="561" text-anchor="middle">SmoothEffect</text>
  </g>

  <!-- inheritance (triangle head at base) -->
  <g stroke="#2b3a4a" stroke-width="1.4">
    <line x1="450" y1="426" x2="450" y2="452"/>
    <line x1="105" y1="480" x2="105" y2="452"/><line x1="105" y1="452" x2="450" y2="452"/>
    <line x1="271" y1="480" x2="271" y2="452"/><line x1="437" y1="480" x2="437" y2="452"/>
    <line x1="603" y1="480" x2="603" y2="452"/><line x1="782" y1="480" x2="782" y2="452"/>
    <line x1="105" y1="536" x2="105" y2="530"/><line x1="271" y1="536" x2="271" y2="530"/>
    <line x1="437" y1="536" x2="437" y2="530"/><line x1="603" y1="536" x2="603" y2="530"/>
    <line x1="782" y1="536" x2="782" y2="530"/>
  </g>
  <line x1="450" y1="452" x2="450" y2="428" stroke="#2b3a4a" stroke-width="1.4" marker-end="url(#tri)"/>

  <text x="450" y="614" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" font-style="italic" fill="#1b2733">Adding a tool means adding one subclass here. SegmentEditor and the bridge do not change (Open/Closed).</text>
</svg>
