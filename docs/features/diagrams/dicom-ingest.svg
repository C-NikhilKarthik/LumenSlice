<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#2b3a4a"/>
    </marker>
  </defs>

  <text x="490" y="30" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1b2733">DICOM ingest: folder to HU volume to per-axis CGImage</text>

  <!-- Row 1: ingest pipeline -->
  <!-- Folder -->
  <rect x="30" y="70" width="150" height="70" rx="6" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="105" y="100" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">DICOM folder</text>
  <text x="105" y="120" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">recursive crawl</text>

  <!-- DICM filter -->
  <rect x="215" y="70" width="160" height="70" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="295" y="96" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">DICM filter</text>
  <text x="295" y="115" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">magic at byte 128</text>
  <text x="295" y="132" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">HasDicmSignature</text>

  <!-- Parse + decode -->
  <rect x="410" y="70" width="180" height="70" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="500" y="92" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">Parse + decode</text>
  <text x="500" y="110" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">DCMTK dcmdata</text>
  <text x="500" y="127" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">JPEG / JPEG-LS / RLE</text>

  <!-- HU calibrate -->
  <rect x="625" y="70" width="170" height="70" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="710" y="92" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">HU calibrate</text>
  <text x="710" y="110" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">raw * slope</text>
  <text x="710" y="127" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">+ intercept</text>

  <!-- arrows row 1 -->
  <line x1="180" y1="105" x2="211" y2="105" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="375" y1="105" x2="406" y2="105" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="105" x2="621" y2="105" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: series selection + sort + assemble -->
  <!-- Largest series -->
  <rect x="215" y="185" width="180" height="72" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="305" y="209" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">Keep largest series</text>
  <text x="305" y="228" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">by Series UID count,</text>
  <text x="305" y="245" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">lock rows/cols</text>

  <!-- Z-sort -->
  <rect x="430" y="185" width="180" height="72" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="520" y="209" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">Geometric Z-sort</text>
  <text x="520" y="228" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">project IPP on the</text>
  <text x="520" y="245" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">IOP slice normal</text>

  <!-- arrows from HU calibrate down to series selection -->
  <line x1="710" y1="140" x2="710" y2="163" stroke="#2b3a4a" stroke-width="1.5"/>
  <line x1="710" y1="163" x2="305" y2="163" stroke="#2b3a4a" stroke-width="1.5"/>
  <line x1="305" y1="163" x2="305" y2="181" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="395" y1="221" x2="426" y2="221" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- HU volume -->
  <rect x="655" y="180" width="290" height="82" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="800" y="205" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">Volume: flat float[] of HU</text>
  <text x="800" y="225" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">X fastest, then Y, then Z</text>
  <text x="800" y="243" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">+ spacing, hu_min, hu_max</text>

  <line x1="610" y1="221" x2="651" y2="221" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: window/level + plane_map -->
  <!-- ExtractSlice / window-level -->
  <rect x="530" y="320" width="330" height="96" rx="6" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="695" y="346" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">ExtractSlice: window / level</text>
  <text x="695" y="366" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">lower = level - window/2</text>
  <text x="695" y="384" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">map HU window to 0..255 gray</text>
  <text x="695" y="402" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">pixels via plane_map</text>

  <line x1="800" y1="262" x2="800" y2="316" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- plane_map helper -->
  <rect x="230" y="330" width="240" height="76" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="350" y="356" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">plane_map</text>
  <text x="350" y="375" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">plane_to_voxel per axis,</text>
  <text x="350" y="392" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">coronal/sagittal flip</text>

  <line x1="470" y1="368" x2="526" y2="368" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 4: three CGImages -->
  <rect x="120" y="470" width="200" height="60" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="220" y="497" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">Axial CGImage</text>
  <text x="220" y="516" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">width x height</text>

  <rect x="390" y="470" width="200" height="60" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="490" y="497" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">Coronal CGImage</text>
  <text x="490" y="516" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">width x depth</text>

  <rect x="660" y="470" width="200" height="60" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="1.5"/>
  <text x="760" y="497" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1b2733">Sagittal CGImage</text>
  <text x="760" y="516" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#1b2733">height x depth</text>

  <!-- fan-out arrows from ExtractSlice to the three images -->
  <line x1="695" y1="416" x2="695" y2="440" stroke="#2b3a4a" stroke-width="1.5"/>
  <line x1="220" y1="440" x2="760" y2="440" stroke="#2b3a4a" stroke-width="1.5"/>
  <line x1="220" y1="440" x2="220" y2="466" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="440" x2="490" y2="466" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="440" x2="760" y2="466" stroke="#2b3a4a" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
