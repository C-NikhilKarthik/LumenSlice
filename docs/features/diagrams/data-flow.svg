<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L9,5 L0,9 z" fill="#2b3a4a"/>
    </marker>
  </defs>

  <text x="440" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1b2733">Data and control flow</text>
  <text x="440" y="54" text-anchor="middle" font-size="13" fill="#1b2733">Top: a scan becomes slice images on screen. Bottom: an edit becomes an overlay and a mesh.</text>

  <!-- ============ VIEW PATH ============ -->
  <text x="40" y="86" font-size="15" font-weight="bold" fill="#1b2733">View path: DICOM folder to screen</text>

  <rect x="40" y="98" width="150" height="60" rx="6" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="2"/>
  <text x="115" y="124" text-anchor="middle" font-size="13" fill="#1b2733">DICOM folder</text>
  <text x="115" y="142" text-anchor="middle" font-size="12" fill="#1b2733">many .dcm files</text>

  <line x1="190" y1="128" x2="228" y2="128" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="209" y="118" text-anchor="middle" font-size="11" fill="#1b2733">load</text>

  <rect x="230" y="98" width="170" height="60" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="315" y="122" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2733">Volume</text>
  <text x="315" y="139" text-anchor="middle" font-size="12" fill="#1b2733">flat float[] of HU</text>
  <text x="315" y="153" text-anchor="middle" font-size="11" fill="#1b2733">src/core/volume.h</text>

  <line x1="400" y1="128" x2="438" y2="128" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="419" y="118" text-anchor="middle" font-size="11" fill="#1b2733">extract</text>

  <rect x="440" y="98" width="180" height="60" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="530" y="120" text-anchor="middle" font-size="13" fill="#1b2733">ExtractSlice</text>
  <text x="530" y="136" text-anchor="middle" font-size="11" fill="#1b2733">per axis + window/level</text>
  <text x="530" y="151" text-anchor="middle" font-size="11" fill="#1b2733">-> RGBA8 slice buffer</text>

  <line x1="620" y1="128" x2="658" y2="128" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="639" y="118" text-anchor="middle" font-size="11" fill="#1b2733">bridge</text>

  <rect x="660" y="98" width="180" height="60" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="2"/>
  <text x="750" y="118" text-anchor="middle" font-size="13" fill="#1b2733">CGImage in panes</text>
  <text x="750" y="134" text-anchor="middle" font-size="11" fill="#1b2733">axial / coronal / sagittal</text>
  <text x="750" y="149" text-anchor="middle" font-size="11" fill="#1b2733">+ 3D pane in the quad</text>

  <text x="440" y="182" text-anchor="middle" font-size="11" fill="#1b2733">lumen_load_folder -> lumen_extract_slice cross the C bridge; Swift wraps the bytes in a CGImage (VolumeModel.refresh).</text>

  <!-- divider -->
  <line x1="40" y1="206" x2="840" y2="206" stroke="#2b3a4a" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ============ EDIT PATH ============ -->
  <text x="40" y="236" font-size="15" font-weight="bold" fill="#1b2733">Edit path: click to overlay and mesh</text>

  <!-- app -->
  <rect x="40" y="252" width="200" height="80" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="2"/>
  <text x="140" y="276" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2733">App: tool + gesture</text>
  <text x="140" y="294" text-anchor="middle" font-size="11" fill="#1b2733">threshold, fill, level trace,</text>
  <text x="140" y="309" text-anchor="middle" font-size="11" fill="#1b2733">paint/erase, grow, scissor</text>
  <text x="140" y="325" text-anchor="middle" font-size="11" fill="#1b2733">SegmentationModel</text>

  <line x1="240" y1="292" x2="278" y2="292" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="259" y="282" text-anchor="middle" font-size="11" fill="#1b2733">C fn</text>

  <!-- bridge -->
  <rect x="280" y="252" width="150" height="80" rx="6" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="2"/>
  <text x="355" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2733">C bridge</text>
  <text x="355" y="296" text-anchor="middle" font-size="11" fill="#1b2733">lumen_seg_push_undo,</text>
  <text x="355" y="311" text-anchor="middle" font-size="11" fill="#1b2733">then lumen_seg_*</text>
  <text x="355" y="326" text-anchor="middle" font-size="11" fill="#1b2733">extern "C"</text>

  <line x1="430" y1="292" x2="468" y2="292" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- SegmentEditor -->
  <rect x="470" y="252" width="180" height="80" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="560" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2733">SegmentEditor</text>
  <text x="560" y="296" text-anchor="middle" font-size="11" fill="#1b2733">facade; runs a</text>
  <text x="560" y="311" text-anchor="middle" font-size="11" fill="#1b2733">SegmentationEffect</text>
  <text x="560" y="326" text-anchor="middle" font-size="11" fill="#1b2733">on the active segment</text>

  <line x1="650" y1="292" x2="688" y2="292" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="669" y="282" text-anchor="middle" font-size="11" fill="#1b2733">writes</text>

  <!-- LabelVolume -->
  <rect x="690" y="252" width="150" height="80" rx="6" fill="#dfe8dc" stroke="#2b3a4a" stroke-width="2"/>
  <text x="765" y="278" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2733">LabelVolume</text>
  <text x="765" y="296" text-anchor="middle" font-size="11" fill="#1b2733">1 byte / voxel</text>
  <text x="765" y="311" text-anchor="middle" font-size="11" fill="#1b2733">0 = background</text>
  <text x="765" y="326" text-anchor="middle" font-size="11" fill="#1b2733">1..255 = segment id</text>

  <!-- from mask down to two outputs -->
  <line x1="765" y1="332" x2="765" y2="380" stroke="#2b3a4a" stroke-width="2"/>
  <line x1="765" y1="380" x2="300" y2="380" stroke="#2b3a4a" stroke-width="2"/>
  <line x1="765" y1="380" x2="600" y2="380" stroke="#2b3a4a" stroke-width="2"/>
  <text x="480" y="372" text-anchor="middle" font-size="11" fill="#1b2733">mask read back up, two ways</text>

  <!-- overlay branch -->
  <line x1="300" y1="380" x2="300" y2="418" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="150" y="420" width="300" height="76" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="2"/>
  <text x="300" y="444" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2733">2D coloured overlay</text>
  <text x="300" y="462" text-anchor="middle" font-size="11" fill="#1b2733">lumen_extract_mask_slice -> premultiplied RGBA8</text>
  <text x="300" y="478" text-anchor="middle" font-size="11" fill="#1b2733">drawn on top of the slice image in each pane</text>

  <!-- mesh branch -->
  <line x1="600" y1="380" x2="600" y2="418" stroke="#2b3a4a" stroke-width="2" marker-end="url(#arrow2)"/>
  <rect x="470" y="420" width="330" height="76" rx="6" fill="#e8eef7" stroke="#2b3a4a" stroke-width="2"/>
  <text x="635" y="444" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b2733">3D surface</text>
  <text x="635" y="462" text-anchor="middle" font-size="11" fill="#1b2733">snapshot (main thread) -> marching cubes (background)</text>
  <text x="635" y="478" text-anchor="middle" font-size="11" fill="#1b2733">SceneKit view; binary STL / PNG export</text>

  <!-- undo note -->
  <rect x="40" y="524" width="800" height="70" rx="6" fill="#f3e8d0" stroke="#2b3a4a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="60" y="548" font-size="13" font-weight="bold" fill="#1b2733">Undo / redo</text>
  <text x="60" y="568" font-size="11" fill="#1b2733">Every edit is preceded by an RLE snapshot on the UndoStack (lumen_seg_push_undo). A tab-aware Cmd-Z routes the global</text>
  <text x="60" y="584" font-size="11" fill="#1b2733">undo: the segmentation RLE stack on most tabs, MarkupModel.removeLast() on the Markups tab.</text>
</svg>
